<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outils JP — Fabrication de Mobilier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111009;
    --grain: rgba(255,255,255,0.015);
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --wood: #7a4a28;
    --wood2: #b07040;
    --cream: #f2ead8;
    --muted: #6b6050;
    --border: #2a2518;
    --card1: #16130d;
    --card2: #0e1510;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Wood grain lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      92deg,
      transparent,
      transparent 60px,
      rgba(122,74,40,0.03) 60px,
      rgba(122,74,40,0.03) 61px
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    margin-bottom: 20px;
    position: relative;
  }
  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
  }
  .logo-mark svg {
    width: 24px;
    height: 24px;
    fill: var(--gold);
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--cream);
    margin-bottom: 6px;
  }
  h1 strong {
    font-weight: 700;
    color: var(--gold2);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    font-family: 'DM Mono', monospace;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 0 auto 40px;
    max-width: 200px;
    animation: fadeDown 0.8s 0.1s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider span {
    font-size: 14px;
    color: var(--gold);
    opacity: 0.6;
  }

  /* ── APP CARDS ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: fadeUp 0.7s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.2s; }
  .card:nth-child(2) { animation-delay: 0.35s; }

  .card:hover { transform: translateY(-4px) scale(1.01); }
  .card:active { transform: scale(0.98); }

  .card-bg {
    position: absolute;
    inset: 0;
    border-radius: 16px;
  }
  .card.debit .card-bg {
    background: var(--card1);
    border: 1px solid rgba(122,74,40,0.4);
  }
  .card.convert .card-bg {
    background: var(--card2);
    border: 1px solid rgba(74,110,90,0.4);
  }

  /* Glow effect */
  .card.debit::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(122,74,40,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.3s;
  }
  .card.convert::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(74,124,107,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1.5; }

  .card-inner {
    position: relative;
    z-index: 2;
    padding: 28px 28px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .card-icon {
    width: 60px;
    height: 60px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    position: relative;
  }
  .card.debit .card-icon {
    background: rgba(122,74,40,0.2);
    border: 1px solid rgba(122,74,40,0.5);
  }
  .card.convert .card-icon {
    background: rgba(74,124,107,0.2);
    border: 1px solid rgba(74,124,107,0.5);
  }

  .card-text { flex: 1; }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card.debit .card-label { color: var(--wood2); }
  .card.convert .card-label { color: #4a9c7b; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .card-arrow {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    transition: transform 0.2s, background 0.2s;
  }
  .card.debit .card-arrow {
    background: rgba(122,74,40,0.2);
    color: var(--wood2);
    border: 1px solid rgba(122,74,40,0.4);
  }
  .card.convert .card-arrow {
    background: rgba(74,124,107,0.2);
    color: #4a9c7b;
    border: 1px solid rgba(74,124,107,0.4);
  }
  .card:hover .card-arrow { transform: translateX(4px); }

  /* Card bottom strip */
  .card-strip {
    height: 3px;
    width: 100%;
  }
  .card.debit .card-strip {
    background: linear-gradient(90deg, var(--wood), var(--wood2), transparent);
  }
  .card.convert .card-strip {
    background: linear-gradient(90deg, #2a6b52, #4a9c7b, transparent);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 48px;
    animation: fadeUp 0.7s 0.5s ease both;
  }
  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
  }
  .footer-text span { color: var(--gold); opacity: 0.7; }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM17.5 14l-3.5 7h7z"/>
      </svg>
    </div>
    <div class="eyebrow">Outils de fabrication</div>
    <h1>Atelier <strong>JP</strong></h1>
  </div>

  <div class="divider">
    <span>✦</span>
  </div>

  <div class="cards">

    <!-- LISTE DE DÉBIT -->
    <a class="card debit" href="liste-debit.html">
      <div class="card-bg"></div>
      <div class="card-inner">
        <div class="card-icon">🪵</div>
        <div class="card-text">
          <div class="card-label">Outil 01</div>
          <div class="card-title">Liste de Débit Brut</div>
          <div class="card-desc">Dimensions finies → brutes. Massif & panneaux. Export PDF et CSV.</div>
        </div>
        <div class="card-arrow">→</div>
      </div>
      <div class="card-strip"></div>
    </a>

    <!-- CONVERTISSEUR -->
    <a class="card convert" href="conversion-app.html">
      <div class="card-bg"></div>
      <div class="card-inner">
        <div class="card-icon">📐</div>
        <div class="card-text">
          <div class="card-label">Outil 02</div>
          <div class="card-title">Convertisseur Pouces / mm</div>
          <div class="card-desc">Fractions de pouce vers millimètres. Tableau complet 1/64" à 1".</div>
        </div>
        <div class="card-arrow">→</div>
      </div>
      <div class="card-strip"></div>
    </a>

  </div>

  <div class="footer">
    <div class="footer-text">Créé par <span>JP</span> avec Claude AI &nbsp;·&nbsp; 2025</div>
  </div>

</div>

</body>
</html>
